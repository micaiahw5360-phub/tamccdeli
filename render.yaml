services:
  - type: web
    name: tamcc-deli
    runtime: php
    buildCommand: ""
    startCommand: apache2-foreground
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tamcc-deli-db
          property: connectionString
      - key: APP_ENV
        value: production

databases:
  - name: tamcc-deli-db
    databaseName: tamccdeli
    user: tamccdeli_user
    plan: free